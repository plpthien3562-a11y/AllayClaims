# AllayClaims Configuration

# Database settings
database:
  type: sqlite
  path: plugins/AllayClaims/claims.db

# Claim settings
claim:
  defaultBlocks: 1000
  blocksPerMember: 100
  pricePerBlock: 10
  maxClaims: 5

# Protection settings
protection:
  enableExplosions: true
  enablePvP: false
  enableMobs: true

# Economy
economy:
  enabled: true
  currencySymbol: "$"